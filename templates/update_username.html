{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Username</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f1f5f9;
        }

        .navbar{
            background:#0f172a;
            padding:15px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            color:white;
            font-size:24px;
            font-weight:bold;
        }

        .nav-links{
            display:flex;
            gap:15px;
        }

        .nav-links a{
            color:white;
            text-decoration:none;
            padding:10px 15px;
            border-radius:6px;
            transition:.3s;
        }

        .nav-links a:hover{
            background:#1e293b;
        }

        .container{
            max-width:500px;
            margin:60px auto;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        .card h2{
            text-align:center;
            margin-bottom:20px;
            color:#0f172a;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:16px;
        }

        .btn{
            width:100%;
            padding:12px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
        }

        .btn:hover{
            background:#1d4ed8;
        }

        .success{
            background:#dcfce7;
            color:#166534;
            padding:12px;
            border-radius:6px;
            margin-bottom:15px;
        }

        .error{
            background:#fee2e2;
            color:#991b1b;
            padding:12px;
            border-radius:6px;
            margin-bottom:15px;
        }

        .current-user{
            margin-bottom:20px;
            padding:10px;
            background:#f8fafc;
            border-radius:6px;
        }
    </style>

</head>
<body>

    <nav class="navbar">
        <div class="logo">AuthApp</div>

        <div class="nav-links">
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <a href="{% url 'update_email' %}">Update Email</a>
            <a href="{% url 'change_password' %}">Change Password</a>
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </nav>

    <div class="container">

        <div class="card">

            <h2>Update Username</h2>

            {% if success %}
                <div class="success">
                    {{ success }}
                </div>
            {% endif %}

            {% if error %}
                <div class="error">
                    {{ error }}
                </div>
            {% endif %}

            <div class="current-user">
                <strong>Current Username:</strong>
                {{ request.user.username }}
            </div>

            <form method="POST">

                {% csrf_token %}

                <div class="form-group">
                    <label>New Username</label>

                    <input
                        type="text"
                        name="username"
                        placeholder="Enter new username"
                        required
                    >
                </div>

                <button type="submit" class="btn">
                    Update Username
                </button>

            </form>

        </div>

    </div>

</body>
</html>
