<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f4f4;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:400px;
            background:#fff;
            padding:30px;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        .form-group{
            margin-bottom:15px;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:8px;
            font-size:16px;
            outline:none;
        }

        input:focus{
            border-color:#000;
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#111;
            color:#fff;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#000;
        }

        .error{
            color:red;
            text-align:center;
            margin-bottom:15px;
        }

        .register-link{
            text-align:center;
            margin-top:18px;
        }

        .register-link a{
            text-decoration:none;
            color:#000;
            font-weight:bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Login</h2>

        {% if error %}
            <div class="error">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required
                >
            </div>

            <div class="form-group">
                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required
                >
            </div>

            <button type="submit" class="btn">
                Login
            </button>
        </form>

        <div class="register-link">
            Don't have an account?
            <a href="{% url 'register' %}">
                Register
            </a>
        </div>
    </div>

</body>
</html>
