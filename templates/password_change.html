{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f1f5f9;
        }

        .navbar{
            background:#0f172a;
            padding:15px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            color:white;
            font-size:24px;
            font-weight:bold;
        }

        .nav-links{
            display:flex;
            gap:15px;
        }

        .nav-links a{
            color:white;
            text-decoration:none;
            padding:10px 15px;
            border-radius:6px;
            transition:.3s;
        }

        .nav-links a:hover{
            background:#1e293b;
        }

        .container{
            max-width:500px;
            margin:60px auto;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        .card h2{
            text-align:center;
            margin-bottom:25px;
            color:#0f172a;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #cbd5e1;
            border-radius:6px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1d4ed8;
        }

        .success{
            background:#dcfce7;
            color:#166534;
            padding:12px;
            border-radius:6px;
            margin-bottom:15px;
        }

        .error{
            background:#fee2e2;
            color:#991b1b;
            padding:12px;
            border-radius:6px;
            margin-bottom:15px;
        }

    </style>

</head>
<body>

    <nav class="navbar">

        <div class="logo">
            AuthApp
        </div>

        <div class="nav-links">
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <a href="{% url 'update_username' %}">Username</a>
            <a href="{% url 'update_email' %}">Email</a>
            <a href="{% url 'logout' %}">Logout</a>
        </div>

    </nav>

    <div class="container">

        <div class="card">

            <h2>Change Password</h2>

            {% if success %}
                <div class="success">
                    {{ success }}
                </div>
            {% endif %}

            {% if error %}
                <div class="error">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST">

                {% csrf_token %}

                <div class="form-group">
                    <label>Current Password</label>
                    <input
                        type="password"
                        name="old_password"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>New Password</label>
                    <input
                        type="password"
                        name="new_password"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input
                        type="password"
                        name="confirm_password"
                        required
                    >
                </div>

                <button type="submit">
                    Change Password
                </button>

            </form>

        </div>

    </div>

</body>
</html>
